server.port=8080
spring.application.name=ozbio-scheduler

# Локальный PostgreSQL (порт 5432). Если пользователя нет: ./scripts/setup-local-postgres.sh
# Docker (порт 5433): docker compose up -d && mvn spring-boot:run -Dspring-boot.run.profiles=docker
# Схема и креды: скопируйте .env.example → .env
spring.docker.compose.enabled=false

app.db.host=${PG_HOST:localhost}
app.db.port=${PG_PORT:5432}
app.db.name=${PG_DATABASE:ozbio}
app.db.schema=${APP_DB_SCHEMA:testing}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${app.db.host}:${app.db.port}/${app.db.name}?currentSchema=${app.db.schema}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ozbio}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ozbio}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.default-schema=${app.db.schema}
spring.liquibase.liquibase-schema=${app.db.schema}
# demo = автосид каталога; для production: LIQUIBASE_CONTEXTS= (пусто)
spring.liquibase.contexts=${LIQUIBASE_CONTEXTS:demo}
