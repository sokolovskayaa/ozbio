services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ozbio
      POSTGRES_USER: ozbio
      POSTGRES_PASSWORD: ozbio
    ports:
      - "5433:5432"
    volumes:
      - ozbio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozbio -d ozbio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ozbio_pg_data:
