server.port=8080

spring.application.name=ozbio

# PostgreSQL (override via env or SPRING_DATASOURCE_*)
app.db.host=${PG_HOST:127.0.0.1}
app.db.port=${PG_PORT:5432}
app.db.name=${PG_DATABASE:ozbio}
app.db.schema=${APP_DB_SCHEMA:public}

spring.datasource.url=jdbc:postgresql://${app.db.host}:${app.db.port}/${app.db.name}?currentSchema=${app.db.schema}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ozbio}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ozbio}

# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=${app.db.schema}
spring.liquibase.liquibase-schema=${app.db.schema}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
